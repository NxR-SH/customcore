<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation du mot de passe - FiveM Dev Pro</title>
    <meta name="description" content="Réinitialisez votre mot de passe FiveM Dev Pro">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <i class="fas fa-code"></i>
                    <span>FiveM Dev Pro</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Accueil</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="login.html" class="nav-link">Connexion</a></li>
            </ul>
        </div>
    </nav>

    <!-- Reset Password Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-form-container">
                    <div class="auth-header">
                        <h1>Réinitialiser le mot de passe</h1>
                        <p>Saisissez votre nouveau mot de passe</p>
                    </div>

                    <form id="resetPasswordForm" class="auth-form">
                        <div class="form-group">
                            <label for="newPassword">Nouveau mot de passe</label>
                            <input type="password" id="newPassword" name="newPassword" required minlength="6">
                            <small class="form-help">Minimum 6 caractères</small>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirmer le mot de passe</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-key"></i>
                            Mettre à jour le mot de passe
                        </button>
                    </form>

                    <div class="auth-links">
                        <p><a href="login.html">Retour à la connexion</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="reset-password.js"></script>
</body>
</html>
