<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Client - FiveM Dev Pro</title>
    <meta name="description" content="Votre espace client FiveM Dev Pro">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <i class="fas fa-code"></i>
                    <span>FiveM Dev Pro</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="#invoices" class="nav-link">Factures</a></li>
                <li><a href="#subscriptions" class="nav-link">Abonnements</a></li>
                <li><a href="#" onclick="logout()" class="nav-link">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <section class="dashboard-main">
        <div class="container">
            <div class="dashboard-header">
                <h1>Bienvenue, <span id="userName">Client</span></h1>
                <p>Gérez vos factures et abonnements</p>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-file-invoice"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalInvoices">0</h3>
                        <p>Factures totales</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="pendingInvoices">0</h3>
                        <p>Factures en attente</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-sync-alt"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="activeSubscriptions">0</h3>
                        <p>Abonnements actifs</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-euro-sign"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalSpent">€0</h3>
                        <p>Total dépensé</p>
                    </div>
                </div>
            </div>

            <!-- Invoices Section -->
            <section id="invoices" class="dashboard-section">
                <div class="section-header">
                    <h2>Mes Factures</h2>
                    <div class="section-actions">
                        <select id="invoiceFilter" class="filter-select">
                            <option value="all">Toutes les factures</option>
                            <option value="pending">En attente</option>
                            <option value="paid">Payées</option>
                            <option value="overdue">En retard</option>
                        </select>
                    </div>
                </div>
                <div id="invoicesTable" class="data-table">
                    <p class="no-data">Aucune facture pour le moment</p>
                </div>
            </section>

            <!-- Subscriptions Section -->
            <section id="subscriptions" class="dashboard-section">
                <div class="section-header">
                    <h2>Mes Abonnements</h2>
                </div>
                <div id="subscriptionsGrid" class="subscriptions-grid">
                    <p class="no-data">Aucun abonnement actif</p>
                </div>
            </section>
        </div>
    </section>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
